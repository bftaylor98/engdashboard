mapping = {}

[per_part_value]
# Manual mapping of NCR numbers to per part values
# Format: JSON object with NCR numbers as keys and values as values
# Example: mapping = {"25-0536.01": "$150.00", "25-0559.01": "$75.50"}
mapping = {} 
